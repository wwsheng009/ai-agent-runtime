name: imagegen
description: Generate a brand-new image by calling the openai_image_generate tool, which sends a request to an OpenAI-compatible /v1/images/generations provider. Use this when the user asks to create, draw, render, or generate an image, poster, avatar, illustration, wallpaper, or photo-like asset.
version: 1.0.0
category: media
capabilities:
  - image_generation
tags:
  - image
  - generation
  - illustration
  - poster
  - avatar
triggers:
  - type: keyword
    values:
      - imagegen
      - openai_image_generate
      - 生成图片
      - 画图
      - 出图
    weight: 2
  - type: pattern
    values:
      - (?i)\b(generate|create|draw|make|render|design)\b.{0,40}\b(image|picture|photo|illustration|poster|avatar|wallpaper|portrait|cover)\b
      - (?i)\b(image|picture|photo|illustration|poster|avatar|wallpaper|portrait|cover)\b.{0,20}\b(generate|create|draw|make|render|design)\b
      - (?:生成|创建|画|绘制|做|出).{0,20}(?:图片|图像|插画|海报|头像|壁纸|封面|照片)
      - (?:来|给我).{0,8}(?:一张|一个).{0,16}(?:图片|图像|插画|海报|头像|壁纸|照片)
    weight: 2
tools:
  - openai_image_generate
workflow:
  steps:
    - id: generate_image
      name: Generate image with /v1/images/generations
      tool: openai_image_generate
      args:
        prompt: "{{prompt}}"
context:
  files: []
  environment: []
  symbols: []
permissions: []
