resource_manager:
    cross_provider_key_selection: ${CROSS_PROVIDER_KEY_SELECTION:-true}
    default_group_algorithm: tiered
    default_key_algorithm: health_based
    default_provider_algorithm: round_robin
    enable_stats: ${RESOURCE_MANAGER_ENABLE_STATS:-true}
    enabled: ${RESOURCE_MANAGER_ENABLED:-true}
    health_check:
        auto_recovery: ${RESOURCE_MANAGER_AUTO_RECOVERY:-true}
        enabled: ${RESOURCE_MANAGER_HEALTH_CHECK_ENABLED:-true}
        interval: ${RESOURCE_MANAGER_HEALTH_CHECK_INTERVAL:-60s}
        recovery_threshold: ${RESOURCE_MANAGER_RECOVERY_THRESHOLD:-0.90}
    stats_retention: ${RESOURCE_MANAGER_STATS_RETENTION:-24h}
retry:
    default_backoff_multiplier: 2
    default_max_retries: ${RETRY_DEFAULT_MAX_RETRIES:-3}
    default_retry_delay_ms: ${RETRY_DEFAULT_DELAY_MS:-1000}
    enabled: ${RETRY_ENABLED:-true}
    enhanced_strategy:
        enabled: ${ENHANCED_STRATEGY_ENABLED:-true}
        fallback_threshold: 4
        primary_min_score: 40
        secondary_excluded_score: 10
        secondary_threshold: 2
    invalid_encrypted_content_recovery:
        strip_client_state_once: ${RETRY_INVALID_ENCRYPTED_CONTENT_STRIP_CLIENT_STATE_ONCE:-false}
    rules:
        - backoff_multiplier: 1.5
          description: SSE 空流响应自动重试（只有 ping/waiting 事件）
          enabled: true
          keyword:
            case_sensitive: false
            values:
                - empty_stream_response
                - only ping events
          max_retries: 3
          name: empty_stream_response
          retry_delay_ms: 2000
        - backoff_multiplier: 1.5
          description: SSE 流式响应心跳超时自动重试
          enabled: true
          keyword:
            case_sensitive: false
            values:
                - heartbeat timeout
          max_retries: 3
          name: sse_heartbeat_timeout
          retry_delay_ms: 5000
        - backoff_multiplier: 2
          description: Codex 流式响应在 response.completed 前断开时自动重试
          enabled: true
          error_code:
            codes:
                - request_timeout
          keyword:
            case_sensitive: false
            values:
                - stream disconnected before completion
                - stream closed before response.completed
                - request timeout
          max_retries: 3
          name: codex_request_timeout_retry
          retry_delay_ms: 1000
        - backoff_multiplier: 2
          description: HTTP 5xx 服务器错误重试
          enabled: true
          max_retries: 3
          name: http_5xx_retry
          retry_delay_ms: 1000
          status_code:
            range: 500-504
        - backoff_multiplier: 1.5
          description: 上下文长度超限自动重试（触发截断逻辑）
          enabled: true
          error_code:
            pattern: ^13.*
          max_retries: 5
          name: context_limit_retry
          retry_delay_ms: 500
        - backoff_multiplier: 2
          description: 速率限制错误重试（429 Too Many Requests）
          enabled: true
          error_code:
            codes:
                - "1302"
                - rate_limit_exceeded
                - slow_down
          keyword:
            case_sensitive: false
            patterns:
                - (?i)(rate.?limit|限流|频率限制)
                - (?i)(too.?many.?requests|请求过多)
                - (?i)(quota.?exceeded|配额超限)
                - (?i)(api.?calls?.?(limit|exceeded)|API调用限制)
            values:
                - rate limit
                - too many requests
                - 速率限制
                - 限流
                - 频率限制
          max_retries: 10
          name: rate_limit_retry
          retry_delay_ms: 2000
routing:
    failover: true
    routes:
