aicli:
    log:
        enabled: ${AICLI_LOG_ENABLED:-true}
        file_path: ${AICLI_LOG_FILE_PATH:-~/.aicli/logs/aicli.log}
    mcp:
        auto_connect: ${MCP_AUTO_CONNECT:-false}
        config_file: ${MCP_CONFIG_FILE:-configs/mcp.yaml}
    retry:
        fast_retry_count: ${AICLI_RETRY_FAST_COUNT:-5}
        fast_retry_interval: ${AICLI_RETRY_FAST_INTERVAL:-2s}
        max_total_time: ${AICLI_RETRY_MAX_TOTAL_TIME:-60s}
        slow_retry_interval: ${AICLI_RETRY_SLOW_INTERVAL:-5s}
    timeout:
        request_timeout: ${AICLI_REQUEST_TIMEOUT:-0s}
auth:
    access_auth:
        allow_anonymous: ${AUTH_ACCESS_ALLOW_ANONYMOUS:-true}
        enabled: ${AUTH_ACCESS_ENABLED:-false}
    access_key_secret: ${AUTH_ACCESS_KEY_SECRET:-}
    admin_auth_enabled: ${AUTH_ADMIN_ENABLED:-false}
    admin_token: ${AUTH_ADMIN_TOKEN:-}
    jwt_expire: ${JWT_EXPIRE:-24h}
    jwt_secret: ${AUTH_JWT_SECRET:-change-this-in-production}
    max_api_create_times: ${AUTH_MAX_API_CREATE_TIMES:-100}
    session_timeout: ${AUTH_SESSION_TIMEOUT:-30m}
circuit_breaker:
    failure_rate: ${CB_FAILURE_RATE:-0.5}
    failure_threshold: ${CB_FAILURE_THRESHOLD:-3}
    half_open_max_calls: ${CB_HALF_OPEN_MAX_CALLS:-1}
    open_timeout: ${CB_OPEN_TIMEOUT:-60s}
    sample_threshold: ${CB_SAMPLE_THRESHOLD:-10}
    window_duration: ${CB_WINDOW_DURATION:-10s}
concurrency:
    enabled: ${CONCURRENCY_ENABLED:-true}
    max_concurrent_requests: ${CONCURRENCY_MAX_REQUESTS:-200}
    per_provider_limits:
        bigmodel: 150
        deepseek: 50
        deepseek_anthropic: 50
        deepseek_beta: 50
        default: 50
        gemini_local: 40
        nvidia: 100
    queue_size: ${CONCURRENCY_QUEUE_SIZE:-500}
    queue_timeout: ${CONCURRENCY_QUEUE_TIMEOUT:-5s}
database:
    auto_migrate: true
    conn_max_lifetime: 3600
    driver: ${DATABASE_DRIVER:-sqlite}
    dsn: ${DATABASE_DSN:-./data/gateway.db}
    log_level: ${DATABASE_LOG_LEVEL:-info}
    max_idle_conns: 10
    max_open_conns: 100
    prefix: ""
    sqlite:
        auto_vacuum: ${SQLITE_AUTO_VACUUM:-incremental}
        bootstrap_auto_vacuum: ${SQLITE_BOOTSTRAP_AUTO_VACUUM:-false}
        busy_timeout_ms: ${SQLITE_BUSY_TIMEOUT_MS:-5000}
        checkpoint_on_maintenance: ${SQLITE_CHECKPOINT_ON_MAINTENANCE:-true}
        foreign_keys: ${SQLITE_FOREIGN_KEYS:-true}
        incremental_vacuum_min_free_pages: ${SQLITE_INCREMENTAL_VACUUM_MIN_FREE_PAGES:-1024}
        incremental_vacuum_min_free_ratio: ${SQLITE_INCREMENTAL_VACUUM_MIN_FREE_RATIO:-0.10}
        incremental_vacuum_pages: ${SQLITE_INCREMENTAL_VACUUM_PAGES:-4096}
        journal_mode: ${SQLITE_JOURNAL_MODE:-WAL}
        maintenance_interval: ${SQLITE_MAINTENANCE_INTERVAL:-10m}
        synchronous: ${SQLITE_SYNCHRONOUS:-NORMAL}
        wal_auto_checkpoint_pages: ${SQLITE_WAL_AUTO_CHECKPOINT_PAGES:-1000}
log:
    compress: true
    enabled: ${LOG_ENABLED:-true}
    enable_console: ${LOG_ENABLE_CONSOLE:-false}
    file_path: ${LOG_FILE_PATH:-~/.aicli/logs/gateway.log}
    format: ${LOG_FORMAT:-json}
    level: ${LOG_LEVEL:-debug}
    max_age: ${LOG_MAX_AGE:-7}
    max_backups: ${LOG_MAX_BACKUPS:-3}
    max_size: ${LOG_MAX_SIZE:-100}
    output: ${LOG_OUTPUT:-both}
    request_log:
        mask_sensitive_fields: ${LOG_REQUEST_MASK_SENSITIVE_FIELDS:-true}
monitor:
    alert:
        channels:
            - webhook
        enabled: ${ALERT_ENABLED:-false}
        min_threshold: ${ALERT_MIN_THRESHOLD:-5}
        severity: ${ALERT_SEVERITY:-warning}
        webhook_url: ${ALERT_WEBHOOK_URL:-}
    enabled: true
    memory:
        alert_threshold_mb: ${MEMORY_ALERT_THRESHOLD:-1024}
        enabled: ${MEMORY_ENABLED:-true}
        leak_threshold_percent: ${MEMORY_LEAK_THRESHOLD:-50}
        sample_interval: ${MEMORY_SAMPLE_INTERVAL:-15s}
    metrics:
        aggregation: true
        enabled: ${METRICS_ENABLED:-false}
        path: ${METRICS_PATH:-/metrics}
    pprof:
        enabled: ${PPROF_ENABLED:-true}
        gc_interval: ${PPROF_GC_INTERVAL:-30s}
        listen_addr: :6060
    tracing:
        enabled: ${TRACING_ENABLED:-false}
        exporter: ${TRACING_EXPORTER:-stdout}
        sampler: ${TRACING_SAMPLER:-0.1}
        server_addr: ${TRACING_SERVER_ADDR:-localhost:4318}
provider_groups:
    - failover:
        enabled: true
        mode: primary_standby
        scope: model_key
      max_retries: 3
      name: anthropic_group
      providers:
        - enabled: true
          name: CODEX_03
          role: primary
          weight: 100
        - enabled: true
          name: CODEX_04
          role: primary
          weight: 100
        - enabled: true
          name: codex_fox
          role: standby
          weight: 100
      retry_delay: 1s
      strategy: round_robin
      truncation:
        enabled: false
        max_retries: 3
        step: 10
        strategy: percentage
    - failover:
        enabled: true
        mode: primary_standby
        scope: model_key
      max_retries: 3
      name: anthropic_group_second
      providers:
        - enabled: true
          name: codex_ee
          role: primary
          weight: 100
        - enabled: true
          name: codex_fox
          role: standby
          weight: 100
      retry_delay: 1s
      strategy: round_robin
      truncation:
        enabled: false
        max_retries: 3
        step: 10
        strategy: percentage
    - failover:
        enabled: true
        mode: primary_standby
        scope: model_key
      max_retries: 3
      name: openai_group
      providers:
        - enabled: true
          name: codex_ee
          weight: 100
        - enabled: false
          name: bigmodel
          weight: 100
        - enabled: false
          name: nvidia
          weight: 100
        - enabled: false
          name: gemini_local
          weight: 100
        - enabled: false
          name: deepseek
          weight: 80
        - enabled: false
          name: deepseek_beta
          weight: 80
      retry_delay: 1s
      strategy: round_robin
      truncation:
        enabled: false
        max_retries: 6
        step: 20
        strategy: percentage
    - failover:
        enabled: true
        mode: primary_standby
        scope: model_key
      max_retries: 2
      name: codex_group
      providers:
        - enabled: true
          name: codex_ee
          role: primary
          weight: 100
        - enabled: true
          name: codex_fox
          role: standby
          weight: 100
        - enabled: false
          name: bigmodel
          weight: 100
        - enabled: false
          name: nvidia
          weight: 100
        - enabled: false
          name: deepseek_anthropic
          weight: 100
      retry_delay: 1s
      strategy: round_robin
    - failover:
        enabled: true
        mode: primary_standby
        scope: model_key
      max_retries: 2
      name: codex_group_54
      providers:
        - enabled: true
          name: CODEX_03
          role: primary
          weight: 100
        - enabled: true
          name: CODEX_04
          role: primary
          weight: 100
        - enabled: true
          name: codex_fox
          role: standby
          weight: 100
      retry_delay: 1s
    - max_retries: 2
      name: gemini_group
      providers:
        - enabled: true
          name: codex_ee
          weight: 100
        - enabled: false
          name: nvidia
          weight: 100
        - enabled: true
          name: codex_fox
          weight: 100
      retry_delay: 2s
      strategy: round_robin
provider_queue:
    default_slot:
        max_concurrency: 3
        overflow_strategy: overflow
        queue_size: 10
        queue_timeout: 30s
    enabled: ${PROVIDER_QUEUE_ENABLED:-true}
    overflow:
        enabled: true
        max_attempts: 3
        strategy: prefer_empty
    providers:
        deepseek:
            max_concurrency: 5
            queue_size: 15
            queue_timeout: 30s
        deepseek_beta:
            max_concurrency: 5
            queue_size: 15
            queue_timeout: 30s
        nvidia:
            max_concurrency: 5
            queue_size: 20
            queue_timeout: 60s
    wait_heartbeat:
        comment: ': queue heartbeat'
        enabled: true
        interval: 5s
        max_wait_time: 120s
providers:
    default_provider: ${PROVIDERS_DEFAULT:-nvidia}
    http_timeout:
        body_read_timeout: ${PROVIDERS_BODY_READ_TIMEOUT:-60s}
        dial_timeout: ${PROVIDERS_DIAL_TIMEOUT:-5s}
        disable_connection_pooling: ${DISABLE_CONNECTION_POOLING:-false}
        dns_cache_ttl: ${HTTP_DNS_CACHE_TTL:-600s}
        dns_server: ${HTTP_DNS_SERVER:-8.8.8.8}
        fallback_delay: ${HTTP_FALLBACK_DELAY:-50ms}
        http_version: ${HTTP_VERSION:-2}
        idle_conn_timeout: ${PROVIDERS_IDLE_CONN_TIMEOUT:-30s}
        keep_alive: ${PROVIDERS_KEEP_ALIVE:-120s}
        max_conns_per_host: ${PROVIDERS_MAX_CONNS_PER_HOST:-300}
        max_idle_conns: ${PROVIDERS_MAX_IDLE_CONNS:-1000}
        max_idle_conns_per_host: ${PROVIDERS_MAX_IDLE_CONNS_PER_HOST:-200}
        prefer_ipv4: ${HTTP_PREFER_IPV4:-true}
        response_header_timeout: ${PROVIDERS_RESPONSE_HEADER_TIMEOUT:-60s}
        stream_read_timeout: ${PROVIDERS_STREAM_READ_TIMEOUT:-120s}
        tls_handshake_timeout: ${PROVIDERS_TLS_HANDSHAKE_TIMEOUT:-15s}
        upstream_accept_encoding: ${HTTP_UPSTREAM_ACCEPT_ENCODING:-auto}
    items:
        CODEX_03:
            api_key: ${CODEX_03_API_KEYS:-}
            api_path: /v1/responses
            base_url: ${CODEX_03_BASE_URL}
            context_window:
                default: ${CONTEXT_WINDOW_CODEX_03_DEFAULT:-1050000}
                models:
                    gpt-5.2-codex: ${CONTEXT_WINDOW_CODEX_03_GPT_5_2_CODEX:-400000}
                    gpt-5.4: ${CONTEXT_WINDOW_CODEX_03_GPT_5_4:-1050000}
            default_model: gpt-5.4
            enabled: true
            forward_url: /v1/responses
            header_mapping_rules:
                - header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  replace_with: OpenAI JS $1
            header_mappings:
                X-Gateway-Provider: openai_codex
            max_tokens_limit: 10000
            model_capabilities:
                '*':
                    input_modalities:
                        - text
                    native_tools:
                        image_generation: false
                    reasoning_efforts:
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.4:
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
            model_mappings:
                '*': gpt-5.2-codex
                gpt-5.4: gpt-5.4
            protocol: codex
            support_types:
                - gemini
                - openai
                - anthropic
                - codex
            supported_models:
                - gpt-5.2-codex
                - gpt-5.4
                - '*'
            timeout: 300s
        CODEX_04:
            api_key: ${CODEX_04_API_KEYS:-}
            api_path: /v1/responses
            base_url: ${CODEX_04_BASE_URL}
            context_window:
                default: ${CONTEXT_WINDOW_CODEX_04_DEFAULT:-1050000}
                models:
                    gpt-5.2-codex: ${CONTEXT_WINDOW_CODEX_04_GPT_5_2_CODEX:-400000}
                    gpt-5.4: ${CONTEXT_WINDOW_CODEX_04_GPT_5_4:-1050000}
            default_model: gpt-5.4
            enabled: true
            forward_url: /v1/responses
            header_mapping_rules:
                - header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  replace_with: OpenAI JS $1
            header_mappings:
                X-Gateway-Provider: openai_codex
            max_tokens_limit: 10000
            model_capabilities:
                '*':
                    input_modalities:
                        - text
                    native_tools:
                        image_generation: false
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.2-codex:
                    max_context_tokens: 270000
                    auto_compact_token_limit: 200000
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: false
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.4-mini:
                    max_context_tokens: 270000
                    auto_compact_token_limit: 200000
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.4:
                    max_context_tokens: 270000
                    auto_compact_token_limit: 200000
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
            model_mappings:
                '*': gpt-5.4-mini
                gpt-5.2-codex: gpt-5.4-mini
                gpt-5.4-mini: gpt-5.4-mini
                gpt-5.4: gpt-5.4
            protocol: codex
            support_types:
                - gemini
                - openai
                - anthropic
                - codex
            supported_models:
                - gpt-5.2-codex
                - gpt-5.4
                - gpt-5.4-mini
                - '*'
            timeout: 300s
        bigmodel:
            api_key: ${BIGMODEL_API_KEYS:-}
            api_key_config:
                enabled: true
                fallback_mode: ${BIGMODEL_FALLBACK_MODE:-random}
                max_retries_per_key: ${BIGMODEL_MAX_RETRIES_PER_KEY:-1}
                selection_mode: ${BIGMODEL_KEY_SELECTION_MODE:-health_based}
            api_path: /v1/messages
            base_url: https://open.bigmodel.cn/api/anthropic
            default_model: glm-5
            enabled: true
            forward_url: /v1/messages
            max_tokens_limit: 10000
            model_mappings:
                '*': glm-5
            path_mappings: null
            protocol: anthropic
            support_types:
                - anthropic
                - openai
                - codex
            supported_models:
                - glm-5
                - glm-4.7
                - glm-4-plus
                - glm-4-air
                - glm-4-flash
            timeout: 300s
            truncation_adapter: anthropic_local
        codex_cli_gpt:
            api_key: ${CODEX_CLI_API_KEYS}
            api_path: /responses
            base_url: https://chatgpt.com/backend-api/codex/responses
            context_window:
                default: ${CONTEXT_WINDOW_CODEX_CLI_GPT_DEFAULT:-1050000}
                models:
                    gpt-5.4: ${CONTEXT_WINDOW_CODEX_CLI_GPT_GPT_5_4:-1050000}
            default_model: gpt-5.4
            enabled: true
            forward_url: /responses
            header_mapping_rules:
                - header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  replace_with: codex_cli_rs/0.112.0 (Windows 10.0.26200; x86_64) WindowsTerminal
            header_mappings:
                X-Gateway-Provider: openai_codex
            headers:
                ChatGPT-Account-Id: ${CHATGPT_ACCOUNT_ID}
            max_tokens_limit: 10000
            model_capabilities:
                '*':
                    input_modalities:
                        - text
                    native_tools:
                        image_generation: false
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.4:
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
            model_mappings:
                '*': gpt-5.4
            protocol: codex
            support_types:
                - gemini
                - openai
                - anthropic
                - codex
            supported_models:
                - gpt-5.4
                - gpt-5.2-codex
                - gpt-5.3
                - '*'
            supports_max_output_tokens: false
            timeout: 300s
        codex_ee:
            api_key: ${CODEX_API_KEYS:-}
            api_path: /v1/responses
            base_url: ${CODEX_BASE_URL:-http://127.0.0.1:8045}
            context_window:
                default: ${CONTEXT_WINDOW_CODEX_EE_DEFAULT:-400000}
                models:
                    gpt-5.2-codex: ${CONTEXT_WINDOW_CODEX_EE_GPT_5_2_CODEX:-400000}
            default_model: gpt-5.4
            enabled: true
            forward_url: /v1/responses
            header_mapping_rules:
                - conditions:
                    - header: Accept
                      match: application/json
                      match_type: contains
                      not: false
                  enabled: true
                  header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  name: rewrite-openai-js-user-agent
                  or_conditions:
                    - header: X-Gateway-Debug
                      match_type: exists
                    - header: X-Gateway-Provider
                      match: openai_codex
                      match_type: exact
                  replace_with: OpenAI JS $1
                  stop_on_match: true
                  target_header: User-Agent
                - copy_matched_value: true
                  header: X-Gateway-Provider
                  match_type: exists
                  priority: 10
                  target_header: X-Provider-Shadow
                - copy_from_capture: 1
                  header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  priority: 20
                  target_header: X-User-Agent-Version
                - copy_from_capture_name: version
                  header: User-Agent
                  match: ^OpenAI/JS\s+(?P<version>.+)$
                  match_type: regex
                  target_header: X-User-Agent-Version-Named
                - header: User-Agent
                  match: \d+
                  match_type: regex
                  replace_all: false
                  replace_with: '#'
                  target_header: X-User-Agent-FirstReplace
                - append_value: -ok
                  header: X-Gateway-Provider
                  match_type: exists
                  prepend_value: gw-
                  target_header: X-Gateway-Provider-Decorated
                - header: X-Gateway-Provider
                  match_type: exists
                  set_if_missing: true
                  target_header: X-Gateway-Provider-NewOnly
                  value: created
            header_mappings:
                X-Gateway-Provider: openai_codex
            max_tokens_limit: 10000
            model_capabilities:
                '*':
                    input_modalities:
                        - text
                    native_tools:
                        image_generation: false
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
                gpt-5.4:
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
                    reasoning_efforts:
                        - none
                        - low
                        - medium
                        - high
                        - xhigh
                    reasoning_model: true
            model_mappings:
                '*': gpt-5.4
                gpt-5.2-codex: gpt-5.2-codex
                gpt-5.4-mini: gpt-5.4-mini
                gpt-5.4-nano: gpt-5.4-nano
            protocol: codex
            support_types:
                - gemini
                - openai
                - anthropic
                - codex
            supported_models:
                - gpt-5.4-mini
                - gpt-5.4-nano
                - gpt-5.4
                - gpt-5.2-codex
                - '*'
            timeout: 300s
        codex_fox:
            api_key: ${CODEX2_API_KEYS:-}
            api_path: /v1/responses
            base_url: https://beecode.cc
            context_window:
                default: ${CONTEXT_WINDOW_CODEX_FOX_DEFAULT:-400000}
                models:
                    gpt-5.2-codex: ${CONTEXT_WINDOW_CODEX_FOX_GPT_5_2_CODEX:-400000}
            default_model: gpt-5.2-codex
            enabled: true
            forward_url: /v1/responses
            header_mapping_rules:
                - header: User-Agent
                  match: ^OpenAI/JS\s+(.+)$
                  match_type: regex
                  replace_with: OpenAI JS $1
            header_mappings:
                X-Gateway-Provider: openai_codex
            headers: {}
            max_tokens_limit: 10000
            model_capabilities:
                '*':
                    input_modalities:
                        - text
                    native_tools:
                        image_generation: false
                gpt-5.4:
                    input_modalities:
                        - text
                        - image
                    native_tools:
                        image_generation: true
            model_mappings:
                '*': gpt-5.2-codex
                gpt-5.4-mini: gpt-5.4-mini
                gpt-5.4-nano: gpt-5.4-nano
            protocol: codex
            support_types:
                - gemini
                - openai
                - anthropic
                - codex
            supported_models:
                - gpt-5.2-codex
                - gpt-5.4
                - gpt-5.4-mini
                - gpt-5.4-nano
                - '*'
            timeout: 300s
            truncation_adapter: ""
        deepseek:
            api_key: ${DEEPSEEK_API_KEY:-}
            api_path: ""
            base_url: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
            default_model: deepseek-v4-flash
            enabled: true
            forward_url: /v1/chat/completions
            max_tokens_limit: 8000
            model_capabilities:
                deepseek-v4-pro:
                    reasoning_efforts:
                        - high
                        - max
                    reasoning_model: true
            model_mappings:
                '*': deepseek-v4-flash
                claude*: deepseek-v4-flash
                glm-4-plus: deepseek-v4-flash
                glm-4.7: deepseek-v4-flash
                gpt-3.5-turbo: deepseek-v4-flash
                gpt-4: deepseek-v4-flash
                gpt-4o: deepseek-v4-flash
                gpt-4-turbo: deepseek-v4-flash
                o1: deepseek-v4-pro
                o1-mini: deepseek-v4-flash
                o1-preview: deepseek-v4-pro
            protocol: openai
            support_types:
                - openai
                - anthropic
            supported_models:
                - deepseek-v4-flash
                - deepseek-v4-pro
            timeout: 300s
            truncation_adapter: openai_local
        deepseek_anthropic:
            api_key: ${DEEPSEEK_API_KEY:-}
            api_path: /v1/messages
            base_url: ${DEEPSEEK_ANTHROPIC_BASE_URL:-https://api.deepseek.com/anthropic}
            default_model: deepseek-v4-flash
            enabled: true
            forward_url: /v1/messages
            max_tokens_limit: 8000
            model_mappings:
                '*': deepseek-v4-flash
                claude-*: deepseek-v4-flash
            protocol: anthropic
            support_types:
                - anthropic
            supported_models:
                - deepseek-v4-flash
                - deepseek-v4-pro
            timeout: 300s
            truncation_adapter: anthropic_local
        deepseek_beta:
            api_key: ${DEEPSEEK_API_KEY:-}
            api_path: /v1/chat/completions
            base_url: ${DEEPSEEK_BETA_BASE_URL:-https://api.deepseek.com/beta}
            default_model: deepseek-v4-flash
            enabled: true
            forward_url: /v1/chat/completions
            max_tokens_limit: 8000
            model_capabilities:
