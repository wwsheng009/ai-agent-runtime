version: 1
provider_templates:
  - id: codex.responses
    protocol: codex
    api_path: /v1/responses
    forward_url: /v1/responses
    support_types:
      - codex
      - openai
      - anthropic
      - gemini
    max_tokens_limit: 10000

  - id: openai.chat
    protocol: openai
    api_path: /v1/chat/completions
    forward_url: /v1/chat/completions
    support_types:
      - openai
    max_tokens_limit: 10000

  - id: openai.images
    protocol: openai
    api_path: /v1/images/generations
    forward_url: /v1/images/generations
    support_types:
      - openai

  - id: anthropic.messages
    protocol: anthropic
    api_path: /v1/messages
    forward_url: /v1/messages
    support_types:
      - anthropic
    max_tokens_limit: 131072

  - id: gemini.generate
    protocol: gemini
    api_path: /v1beta/models
    forward_url: /v1beta/models/{model}:streamGenerateContent?alt=sse
    support_types:
      - gemini
      - openai
      - anthropic
      - codex
    max_tokens_limit: 10000

cards:
  - id: fallback.codex.responses
    title: Codex Responses Fallback
    priority: -100
    fallback: true
    provider_template: codex.responses
    match:
      protocols:
        - codex
    capability:
      input_modalities:
        - text

  - id: fallback.openai.chat
    title: OpenAI Chat Fallback
    priority: -100
    fallback: true
    provider_template: openai.chat
    match:
      protocols:
        - openai
    capability:
      input_modalities:
        - text

  - id: fallback.openai.images
    title: OpenAI Images Fallback
    priority: -100
    fallback: true
    provider_template: openai.images
    match:
      protocols:
        - openai
    capability:
      input_modalities:
        - text
      native_tools:
        images_generations_api: true

  - id: fallback.anthropic.messages
    title: Anthropic Messages Fallback
    priority: -100
    fallback: true
    provider_template: anthropic.messages
    match:
      protocols:
        - anthropic
    capability:
      input_modalities:
        - text

  - id: fallback.gemini.generate
    title: Gemini Generate Fallback
    priority: -100
    fallback: true
    provider_template: gemini.generate
    match:
      protocols:
        - gemini
    capability:
      input_modalities:
        - text

  - id: openai.gpt-5.4.codex
    title: GPT 5.4 Codex
    priority: 100
    provider_template: codex.responses
    match:
      model_ids:
        - gpt-5.4
      protocols:
        - codex
    capability:
      max_context_tokens: 270000
      auto_compact_token_limit: 200000
      input_modalities:
        - text
        - image
      native_tools:
        image_generation: true
      reasoning_model: true
      reasoning_efforts:
        - none
        - low
        - medium
        - high
        - xhigh

  - id: openai.gpt-5.4-mini.codex
