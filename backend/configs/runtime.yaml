version: "v1"

agent:
  enableParallelTools: true
  maxParallelToolCalls: 4

context:
  # Used only when neither provider/model capability nor context.maxPromptTokens
  # can provide an effective prompt budget.
  fallbackMaxPromptTokens: 32000

images:
  cacheMaxAge: 1h
  generations:
    default_model: gpt-image-2
    default_size: "1024x1024"
    default_quality: medium
    default_output_format: png
    request_timeout: 5m
    max_n: 4
