name: run_shell_command
description: Run a shell command through the managed bash MCP tool. The prompt must be the exact command to execute.
version: 1.0.0
category: operations
capabilities:
  - shell_execution
  - diagnostics
tags:
  - shell
  - bash
  - operations
triggers:
  - type: keyword
    values:
      - run command
      - shell command
      - execute shell
      - run shell
    weight: 1.0
tools:
  - bash
workflow:
  steps:
    - id: run_command
      name: Run shell command
      tool: bash
      args:
        command: "{{prompt}}"
context:
  files: []
  environment: []
  symbols: []
permissions:
  - shell
